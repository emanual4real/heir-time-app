version: "3"

services:
  api-prod:
    build: 
      context: ../dotnet-src
      dockerfile: dockerfile
    ports:
      - "8080:8080"
    links:
      - mongo
    depends_on:
     - mongo
    networks:
      - app-network

  ui-prod:
    build: 
      context: ../node-src
      dockerfile: dockerfile
    ports:
      - "80:5173"
    depends_on:
     -  api-prod
    links:
      -  api-prod
    networks:
      - app-network
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules

  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - db-data:/etc/data
    networks:
      - app-network
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

networks:
  app-network:
    driver: bridge

volumes:
  db-data:
